# Application name
spring.application.name=academia

# Server Configuration
server.port=8080

# PostgreSQL Datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/academia
spring.datasource.username=appuser
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
# recrear el modelo de datos. cambiar a update después 
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=my_schema

# Swagger: orden de los Tags
springdoc.swagger-ui.tags-sorter=alpha

# JWT
app.jwt.secret=mySecretKeyForJWTGenerationWithAtLeast32BytesLong!
app.jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
logging.level.com.example.academia=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# MailHog para simulacion mensajes
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

